- id: usb-hub
  hidden: false
  title: Industrial USB Hub
  client: Liam Burns
  category: PCB Design
  thumbnail: "images/projects/liam-burns/tst_500.png"
  summary: "Four-port USB 3.0 hub with industrial power input and per-port power management."
  description: |
    A ruggedized four-port USB 3.0 hub PCB designed for industrial and embedded
    computing applications where standard consumer hubs fall short on power
    handling and reliability.

    The board accepts a wide-range DC input via screw terminals, runs an onboard
    switching regulator to generate a stable 5 V bus for the USB ports, and
    incorporates per-port power switches with overcurrent protection. A dedicated
    USB hub controller IC manages enumeration and bandwidth allocation across all
    four downstream ports.

    The design includes full reset circuitry, status LEDs for each port, and
    test points throughout for production verification.
  images:
    - "images/projects/liam-burns/tst_500.png"
  tags:
    - PCB Design
    - USB 3.0
    - Power Management
    - Industrial

- id: signal-integrity-and-emi-emc
  hidden: false
  title: Signal Integrity & EMI/EMC Analysis
  client: PMG Embedded
  category: Simulation & Analysis
  thumbnail: "images/projects/signal-integrity-and-emi-emc/eye_1.png"
  summary: "Signal integrity simulation and pre-compliance EMI/EMC analysis for high-speed differential interfaces up to 10+ Gbps."
  description: |
    We help companies ensure signal reliability and electromagnetic compliance in
    complex, high-speed designs. Whether a project is preparing for certification or
    troubleshooting critical signal issues, we bring the simulation tools and
    hands-on experience to make the design robust.

    Our signal integrity work covers TDR analysis for precise impedance matching and
    discontinuity detection, eye diagram simulation to quantify signal quality and
    noise margins, and S-parameter characterization for frequency-domain analysis of
    differential and single-ended pairs. Crosstalk analysis rounds out the picture,
    identifying which adjacent signals are most affected and by how much.

    On the EMC side, we perform near-field and far-field emission measurements,
    helping identify and address radiated emissions before formal compliance testing.
    We also provide design reviews covering grounding strategy, layer stackup,
    return path management, and differential routing best practices.

    This service is well suited for designs involving USB 3.x, PCIe, DDR/LPDDR,
    HDMI, Ethernet, or other high-speed interfaces. We have worked on designs up to
    10+ Gbps and combine simulation with practical layout adjustments to close issues
    efficiently. Tools used include Ansys, HyperLynx, and LTspice, alongside custom
    test setups for TDR, crosstalk, and emissions measurement.
  images:
    - "images/projects/signal-integrity-and-emi-emc/eye_1.png"
    - "images/projects/signal-integrity-and-emi-emc/eye_2.png"
    - "images/projects/signal-integrity-and-emi-emc/pcb_1.png"
    - "images/projects/signal-integrity-and-emi-emc/pcb_2.png"
