    - "images/projects/signal-integrity-and-emi-emc/waveform_2.png"
    - "images/projects/signal-integrity-and-emi-emc/waveform_3.png"
    - "images/projects/signal-integrity-and-emi-emc/waveform_4.png"
    - "images/projects/signal-integrity-and-emi-emc/waveform_5.png"
    - "images/projects/signal-integrity-and-emi-emc/waveform_6.png"
