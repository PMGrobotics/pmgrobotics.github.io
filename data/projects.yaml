- id: jetson-carrier-board
  hidden: false
  title: Jetson Xavier NX Carrier Board
  client: Lincon Cavalieri
  category: PCB Design
  thumbnail: "images/projects/lincon-cavalieri/main_image_v2.png"
  summary: "High-density custom carrier board for the NVIDIA Jetson Xavier NX AI compute module."
  description: |
    A compact, high-density carrier board designed to host the NVIDIA Jetson Xavier
    NX system-on-module, targeting edge AI and machine vision applications.

    The board breaks out the module's high-speed interfaces — PCIe, USB 3.0,
    Gigabit Ethernet, MIPI CSI camera lanes, and GPIO — onto application-specific
    connectors sized for the target enclosure. Particular attention was given to
    high-speed signal integrity: controlled-impedance routing, proper reference
    plane management, and decoupling strategy for the Jetson's LPDDR4x memory
    interface.

    PMG Robotics handled the full PCB design and layout, including thermal
    management provisions for sustained AI inference workloads.
