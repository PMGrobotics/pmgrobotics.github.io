- id: iot-sensor-node
  hidden: false
  title: Multi-Sensor IoT Node
  client: Carl Wilhite
  category: PCB Design & Embedded Programming
  thumbnail: "images/projects/carl-wilhite/top.png"
  summary: "Coin-cell powered wireless sensor node integrating gyroscope, pressure, and temperature sensing."
  description: |
    A miniaturized wireless sensor node designed to run for extended periods on
    a single CR3032 coin cell. The board integrates three sensors — a MEMS
    gyroscope, a barometric pressure sensor, and a temperature sensor — onto a
    small, low-profile PCB.

    An STM32 microcontroller (Arm Cortex-M) manages sensor polling, data
    aggregation, and wireless transmission, spending the majority of its time in
    deep sleep to preserve the coin-cell budget. SWD and UART headers are provided
    for development and production testing.

    PMG Robotics handled the schematic capture, component selection for minimum
    current draw, PCB layout, and firmware — delivering a validated, ready-to-deploy
    sensor node.
  images:
    - "images/projects/carl-wilhite/top.png"
    - "images/projects/carl-wilhite/bottom.png"
  tags:
