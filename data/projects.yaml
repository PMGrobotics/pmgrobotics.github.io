- id: smart-lock
  title: Smart Lock
  client: Bikely
  category: PCB Design & Embedded Programming
  thumbnail: "images/projects/smart-lock/pcb-render.png"
  summary: "Ultra-low-power IoT bike lock with NB-IoT connectivity and remote control."
  description: |
    Bikely is a cutting-edge smart bike lock designed to provide security and
    convenience for cyclists. The device is built around an ultra-low-power
    STM32L071CBT6 microcontroller (Arm Cortex-M0+, 32 MHz), keeping battery
    consumption to an absolute minimum.

    The locking mechanism uses a DC motor controlled by a DRV8210 integrated
    motor driver (four N-channel power FETs), providing precise and reliable
    lock/unlock actuation.

    Connectivity is provided by the Quectel BG95-M2 NB-IoT module paired with
    a ceramic antenna and eSIM, enabling remote control from a smartphone app
    with no Wi-Fi infrastructure required.

    PMG Robotics was responsible for the full hardware design, PCB layout,
    and embedded firmware development.
  images:
    - "images/projects/smart-lock/pcb-render.png"
  tags:
    - PCB Design
    - Embedded Programming
    - STM32
    - NB-IoT
    - IoT
    - Ultra-Low-Power

