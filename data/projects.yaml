# ─────────────────────────────────────────────────────────────────────────────
#  PMG Robotics — projects data
#
#  HOW TO ADD A NEW PROJECT:
#  1. Copy one of the blocks below and paste it at the end of this file.
#  2. Fill in the fields. The only required ones are: id, title, client, summary.
#  3. Put your images in images/projects/<your-project-id>/
#  4. Reference them in the "images" list (see examples below).
#  5. Refresh the site — it will appear automatically.
#
#  HOW TO HIDE A PROJECT temporarily:
#  Add a line "hidden: true" inside its block.
#
#  FIELD REFERENCE:
#    id          — URL-safe name, no spaces, lowercase, use hyphens  (e.g. smart-lock)
#    title       — Display name of the project
#    client      — Company / person who commissioned the work
#    category    — Short descriptor shown on the card
#    thumbnail   — Path to the card image (leave empty "" for a letter placeholder)
#    summary     — One-sentence description shown on the project card
#    description — Full description shown on the project detail page.
#                  Use "|" for multi-line text (keep each paragraph indented)
#    images      — List of image paths for the detail page gallery
#    tags        — Short keywords, max 5–6 shown on detail page, first 3 on card
#
#  IMAGE PATHS are relative to the site root, e.g. images/projects/sagitta/pcb.png
# ─────────────────────────────────────────────────────────────────────────────

