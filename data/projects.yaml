- id: qa-maestro-pmu
  hidden: false
  title: QA Maestro Power Management Unit
  client: Paul Kang
  category: PCB Design & Embedded Programming
  thumbnail: "images/projects/paul-kang/tst.png"
  summary: "Intelligent power management unit with STM32 supervision for the QA Maestro platform."
  description: |
    The QA Maestro PMU is the power backbone of the QA Maestro test platform,
    managing 12 V system power and generating the regulated 3.3 V rails required
    by the platform's digital subsystems.

    An STM32 microcontroller acts as the system supervisor: sequencing power rails
    on startup, monitoring supply voltages, and providing a firmware-controlled
    reset and enable interface exposed through a header connector. A USB port
    allows in-field firmware updates and debug communication without disassembling
    the unit.

    PMG Robotics was responsible for the schematic, PCB layout, and the STM32
    supervisory firmware, delivering the board ready for integration into the
    broader QA Maestro system.
  images:
    - "images/projects/paul-kang/tst.png"
  tags:
    - PCB Design
    - Embedded Programming
    - STM32
    - Power Management
    - Industrial

- id: smart-lock-keivan
  hidden: false
  title: Smart Bike Lock
  client: Bikely
  category: PCB Design & Embedded Programming
  thumbnail: "images/projects/smart-lock-keivan/main_image.png"
  summary: "Ultra-low-power IoT bike lock with NB-IoT connectivity and remote control."
  description: |
    Bikely is a smart bike lock designed to give cyclists keyless, app-controlled
    security without relying on Wi-Fi or Bluetooth range. The electronics are built
    around an STM32L071CBT6 microcontroller (Arm Cortex-M0+, 32 MHz) chosen for
    its extremely low active and standby current draw.

    The locking mechanism is driven by a DC motor controlled through a DRV8210
    integrated motor driver, providing precise and reliable lock/unlock actuation.
    Connectivity is handled by a Quectel BG95-M2 NB-IoT module with an embedded
    SIM, giving the lock a nationwide cellular footprint with no infrastructure
    dependency.

    PMG Robotics was responsible for the full hardware design, multilayer PCB
    layout, and embedded firmware development from bring-up through production.
  images:
    - "images/projects/smart-lock-keivan/main_image.png"
    - "images/projects/smart-lock-keivan/image_final_box.png"
    - "images/projects/smart-lock-keivan/image_final_outside_lock.png"
  tags:
